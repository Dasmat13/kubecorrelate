apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: correlate
spec:
  version: v0.1.4
  homepage: https://github.com/Dasmat13/kubecorrelate
  shortDescription: Merge logs, events, and node pressures chronologically
  description: |
    KubeCorrelate is a lightweight CLI troubleshooting tool that multiplexes
    pod container logs, Kubernetes events, config updates, and node-level
    resource pressure alerts into a single time-aligned, colorized stream.
  caveats: |
    Requires an active kubeconfig context. Some features like Node watches
    might require permissions that fallback gracefully if missing.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/Dasmat13/kubecorrelate/releases/download/v0.1.4/kubecorrelate_0.1.4_darwin_amd64.tar.gz
    sha256: 1840b93941ecf3e6cf2392de2fb324896d26945a53213a612464033b0aba733c
    bin: kubecorrelate
    files:
    - from: "kubecorrelate"
      to: "."
    - from: "LICENSE"
      to: "."
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/Dasmat13/kubecorrelate/releases/download/v0.1.4/kubecorrelate_0.1.4_darwin_arm64.tar.gz
    sha256: 9161a0c9d728ad70172c96e76a7d2d767158ad37b4c06d9e60cbd28bbdc19043
    bin: kubecorrelate
    files:
    - from: "kubecorrelate"
      to: "."
    - from: "LICENSE"
      to: "."
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/Dasmat13/kubecorrelate/releases/download/v0.1.4/kubecorrelate_0.1.4_linux_amd64.tar.gz
    sha256: ce68c4f8ef02ab8e83a9f1dcfc5d7e5f5ae06b94c3d55df7042e6e25e6fcf7f7
